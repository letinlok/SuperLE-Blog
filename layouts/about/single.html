{{ define "main" }}
<div class="max-w-3xl mx-auto px-6 py-16 bg-white dark:bg-[#0a0a0a]">

  <article class="prose prose-lg dark:prose-invert max-w-none">

    <!-- 标题 -->
    <h1 class="text-5xl font-bold mb-10 text-black dark:text-white leading-tight">
      {{ .Title }}
    </h1>

    <!-- Markdown 正文内容（关键在这里） -->
    <div class="markdown-content">
      <style>
        .markdown-content h1 {
          font-size: 2.5rem !important;
          margin: 2.5rem 0 1.5rem 0 !important;
        }
        .dark .markdown-content h1 { color: #ffffff !important; }

        .markdown-content h2 {
          font-size: 1.85rem !important;
          margin: 2.2rem 0 1.2rem 0 !important;
          border-bottom: 2px solid #e5e7eb !important;
          padding-bottom: 0.5rem !important;
        }
        .dark .markdown-content h2 { 
          color: #f3f4f6 !important; 
          border-bottom-color: #4b5563 !important;
        }

        .markdown-content h3, .markdown-content h4 {
          font-size: 1.4rem !important;
          margin: 1.8rem 0 1rem 0 !important;
        }
        .dark .markdown-content h3, .markdown-content h4 { color: #e5e7eb !important; }

        .markdown-content ul {
          list-style-type: disc !important;
          padding-left: 1.5rem !important;
        }
        .markdown-content li {
          margin-bottom: 0.5rem !important;
        }

        .markdown-content img {
          max-width: 100% !important;
          border-radius: 12px !important;
          margin: 2rem 0 !important;
          display: block !important;
        }
      </style>

      {{ .Content }}
    </div>

  </article>

</div>
{{ end }}
