            <a href="{{ .URL }}"

              {{ .Name }}

          </li>
          {{ end }}
        </ul>
      </nav>

<!-- JavaScript：实时时间 + 返回顶部按钮 -->
<script>
  // ==================== 当前时间实时更新（优化版） ====================  
  function updateCurrentTime() {
    const now = new Date();
    
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    
    const timeString = `${year}-${month}-${day} ${hours}:${minutes}`;
    
    const timeElement = document.getElementById('current-time');
    if (timeElement) {
      timeElement.textContent = timeString;
    }
  }

  // 页面加载后立即执行 + 每10秒更新一次（更灵敏）
  window.addEventListener('load', () => {
    updateCurrentTime();
    setInterval(updateCurrentTime, 10000);   // 每10秒更新
  });

  // ==================== 返回顶部按钮（保持不变） ====================
  function createBackToTop() {
    const btn = document.createElement('button');
    btn.innerHTML = '↑';
    btn.className = 'fixed bottom-8 right-8 w-12 h-12 bg-[#ec4899] hover:bg-[#db2777] text-white rounded-full shadow-lg flex items-center justify-center text-2xl transition-all duration-300 z-50 opacity-0 invisible';
    document.body.appendChild(btn);

    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        btn.style.opacity = '1';
        btn.style.visibility = 'visible';
        btn.style.display = 'flex';
      } else {
        btn.style.opacity = '0';
        btn.style.visibility = 'hidden';
      }
    });

    btn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  window.addEventListener('load', createBackToTop);
</script>
